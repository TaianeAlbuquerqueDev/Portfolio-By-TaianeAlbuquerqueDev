<!-- Utilizei Web Components (Custom Elements API) para criar um componente de cartão reutilizável. 
O componente é definido como uma classe JavaScript que estende HTMLElement, e é registrado com um nome personalizado usando customElements.define().
O HTML do cartão é encapsulado dentro do componente, permitindo que ele seja facilmente reutilizado em diferentes partes da aplicação sem conflitos de estilo ou comportamento. 
O componente pode ser utilizado em qualquer lugar do HTML simplesmente usando a tag personalizada correspondente. 
Não há necessidade de setar propriedades ou estados manualmente, pois o componente lida com isso internamente, então não é necessário fazer isso no arquivo HTML . -->
